# Ingress yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin-ingress
  namespace: media # MUST match the namespace where your app's service lives
  annotations:
    # Specify the cert-manager resource
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - jellyfin.dev.k8s.powersstudios.net # The URL you want to use
    # cert-manager will automatically create this Secret and store the certificate here
    secretName: jellyfin-tls-secret 
  rules:
  - host: jellyfin.dev.k8s.powersstudios.net # The URL you want to use
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jellyfin-clusterip-svc # The exact name of your app's ClusterIP service
            port:
              number: 8096 # The internal port your app uses