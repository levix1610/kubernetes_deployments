# --- Deployment ---
# Manages the Pods running your application container.
apiVersion: apps/v1
kind: Deployment
metadata:
  # name: A unique name for your Deployment.
  name: luanti-deployment
  namespace: games
  labels:
    app: luanti
spec:
  replicas: 1
  revisionHistoryLimit: 2  # Max number of replicasets
  selector:
    # Must match the labels on the Pod template below.
    matchLabels:
      app: luanti
  template:
    metadata:
      # Labels applied to the Pods created by this Deployment. Must match spec.selector.matchLabels.
      labels:
        app: luanti
    spec:
      containers:
      - name: luanti
        image: linuxserver/luanti:5.16.1 # updated (5/20/26)
        ports:
        - containerPort: 30000 # The port your application listens on INSIDE the container (e.g., 8080)
          name: luanti-port # Optional name for the port
        # volumeMounts: Mounts the volume requested by the PVC into the container.
        volumeMounts:
        - name: luanti-data # Must match the volume name defined below in spec.volumes
          # mountPath: The directory path inside the container where the storage will be accessible.
          mountPath: /config/.minetest # e.g., /app/data or /var/www/html
        # --- Optional but Recommended ---
        resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "1024Mi"
              cpu: "2000m"
        # env:
        # - name: MY_ENV_VAR
        #   value: "my_value"
        # livenessProbe: ... (configure as needed)
        # readinessProbe: ... (configure as needed)

      # volumes: Defines the volumes available to the Pod.
      volumes:
      # - name: Must match the name used in volumeMounts above.
      - name: luanti-data # e.g., app-data
        # persistentVolumeClaim: Links this volume definition to the PVC created earlier.
        persistentVolumeClaim:
          # claimName: Must match the metadata.name of the PVC defined above.
          claimName: luanti-pvc